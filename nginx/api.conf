#nginx/api.conf
server {
    listen 80;
    server_name _;

    #turvaotsakkeet
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer always;
    add_header X-XSS-Protection "1; mode=block" always;

    #lisäjuttu -> vastaa juureen OK, ettei palaa 404
    location = / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Health proxy API:n /health
    location /health {
        proxy_pass http://api:3000/health;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;
    }

    # API: /api/* -> http://api:3000/*  (stripataan /api)
    # tää pitää miettiä haluaako SÄILYTTÄÄ /api-prefiksin backendille
    # ja vaihtaa proxy_pass riviksi:  proxy_pass http://api:3000;
    location /api/ {
        #DoS/rate limit (tää on määritelty 00_globals.conf:ssa)
        limit_req zone=api_limit burst=40 nodelay;

        #stripataan /api -> välitetään backendin juureen
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;

        #headerit taaksepäin
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        #timeoutit - voi höllätä myöhemmin
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Cache vain idempotenteille metodeille
        proxy_cache           api_cache;
        proxy_cache_methods   GET HEAD;
        proxy_cache_valid     200 1m;
        proxy_cache_valid     404 30s;

        #vältetään cachen käyttöä POST/PUT/PATCH/DELETE
        if ($request_method !~ ^(GET|HEAD)$) {
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
    }
}
