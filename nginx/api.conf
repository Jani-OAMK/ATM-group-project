# nginx/api.conf
server {
    listen 80;
    server_name _;

    # Turvaotsakkeet
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Vastaa juureen OK, jottei tuu 404
    location = / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Health proxy API:n /health:iin (ei cachea koskaan)
    location /health {
        proxy_pass http://api:3000/health;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;

        # Ei koskaan cachea /health:iä
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store" always;
    }

    # API: /api/* -> http://api:3000/*  (stripataan /api)
    location /api/ {
        # DoS/rate limit
        limit_req zone=api_limit burst=40 nodelay;

        # stripataan /api -> backendin juureen
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;

        # headerit taaksepäin
        proxy_set_header Host              $host;
        proxy_set_header Connection        "";
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # timeoutit
        proxy_connect_timeout 5s;
        proxy_read_timeout    60s;

        # Cache vain idempotenteille metodeille
        proxy_cache         api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid   200 1m;
        proxy_cache_valid   404 30s;

        # Ohjaa cachen ohitus metodin mukaan (mapattu http-kontekstissa 00_globals.conf:ssa)
        proxy_no_cache      $no_cache;
        proxy_cache_bypass  $no_cache;
    }
}
