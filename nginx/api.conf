# nginx/api.conf
server {
    listen 80;
    server_name _;

    #perus safety headerit
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Health proxy
    location /health {
        proxy_pass http://api:3000/health;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API: /api/* → http://api:3000/*  (stripataan /api/ pois)
    location /api/ {
        # Rate limit (vyöhyke on määritelty http-tasolla 00_globals.conf:ssa)
        limit_req zone=api_limit burst=40 nodelay;

        proxy_pass http://api:3000/;   # HUOM! trailing slash -> strip prefix
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeoutit
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;

        # Cache vain GET/HEAD
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 1m;
        proxy_cache_valid 404 30s;
    }
}
