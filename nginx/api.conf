
#./nginx/api.conf

# HTTP portti 80 (ACME-challenge + ohjaus HTTPS)
server {
    listen 80;
    listen [::]:80;
    server_name ankkalinnanpankki.rocks api.ankkalinnanpankki.rocks;

    # Certbot webroot challenge (EI ohjata HTTPS:ään)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Pakottaa muun liikenteen HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS portti 443 - TLS, API
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ankkalinnanpankki.rocks api.ankkalinnanpankki.rocks;

    # SSL-sertit (Let’s Encrypt, hostilta mountattuna /etc/letsencrypt)
    ssl_certificate /etc/letsencrypt/live/ankkalinnanpankki.rocks/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ankkalinnanpankki.rocks/privkey.pem;

    # TLS-optimoinnit
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;
    #reloverit pitää olla, jos ssl_stapling on päällä
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;


    # proxy asetukset (yleiset headerit)
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # turvaotsakkeet
    add_header X-Content-Type-Options "nosniff" always;     # estää arvailemasta tiedostotyyppejä
    add_header X-Frame-Options "SAMEORIGIN" always;         # estää clickjacking / iframe-upotukset
    add_header X-XSS-Protection "1; mode=block" always;     # vanhemmille selaimille XSS-suoja
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # lisävarmistus ACME-challenge myös 443:ss - ei oo  pakollinen
	#ACME AutomatiCertificateManagementEnviroment, eli hakee sertit automaattisesti
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Vastaa juureen OK, jottei tuu 404
    location = / {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Health proxy API:n /health:iin (ei logia, ei cachea)
    location /health {
        access_log off;
        proxy_pass http://api:3000/api/health;
        proxy_connect_timeout 3s;
        proxy_read_timeout    10s;
        proxy_no_cache 1;
        proxy_cache_bypass 1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # API (REST + WebSocket lisäominaisuus)
    location /api/ {
        # DoS/rate limit
        limit_req zone=api_limit burst=40 nodelay;

        # CORS
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        # CORS-ennakkotarkastuspyyntö (preflight)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin * always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
            add_header Access-Control-Max-Age 1728000 always;
            add_header Content-Type "text/plain; charset=utf-8" always;
            add_header Content-Length 0 always;
            return 204;
        }

        # WebSocket-tuki lisäominaisuudelle
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Timeoutit (WebSocket vaatii pitkän timeoutin, ettei yhteys katkea)
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Cache (käyttää 00_globals.conf asetuksia)
        proxy_cache api_cache;
        proxy_cache_methods GET HEAD;
        proxy_cache_valid 200 1m;
        proxy_cache_valid 404 30s;
        proxy_no_cache $no_cache;
        proxy_cache_bypass $no_cache;

        # proxy bäkkäriin
        proxy_pass http://api:3000;
    }
  
    location /asiakasImages/ {
        alias /usr/share/nginx/html/asiakasImages/;
        autoindex on;
    }
}

