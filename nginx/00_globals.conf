# nginx/00_globals.conf

# Rate limiting: 20 req/s per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

#Proxy cache -alue API:lle (vain GET/HEAD käytössä api.conf:ssa)
proxy_cache_path /var/cache/nginx/api
                 levels=1:2
                 keys_zone=api_cache:50m
                 max_size=100m
                 inactive=10m
                 use_temp_path=off;

#yleiset rajoitukset
client_max_body_size 2m;

# Gzip - nopeutta json-siirtoja
gzip on;
gzip_types application/json application/javascript text/css application/xml text/plain;
gzip_min_length 1024;

# WebSocket-muunnos (Upgrade-otsakkeen käsittely)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Cache-bypassin ohjaus HTTP-metodin perusteella
# GET/HEAD -> cache sallittu (0), muut(Post, PUT jne) -> älä cacheta (1).
map $request_method $no_cache {
    default 1;
    GET     0;
    HEAD    0;
}
