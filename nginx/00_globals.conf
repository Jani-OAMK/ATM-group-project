# nginx/00_globals.conf
# Tämä tiedosto luetaan http{}-kontekstissa, koska se on conf.d:ssä ja
# nginx:stable default nginx.conf sisältää: include /etc/nginx/conf.d/*.conf;

# Rate limiting: 20 req/s / IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;

# Proxy cache -alue API:lle
proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:50m max_size=100m inactive=10m use_temp_path=off;

# Yleisiä oletuksia (turvalliset ja maltilliset)
client_max_body_size 2m;

# (Valinnainen) gzip päälle GET/HEAD:lle
gzip on;
gzip_types application/json application/javascript text/css application/xml text/plain;
gzip_min_length 1024;
